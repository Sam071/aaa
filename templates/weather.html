{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-12 mb-4">
        <h2 class="fw-bold">🌤️ 台北市分區即時氣象</h2>
    </div>
    
    <!-- 區域選擇表單 -->
    <div class="col-md-4 mb-4">
        <div class="card p-4 shadow-sm border-0">
            <form method="POST" action="/weather">
                <div class="mb-3">
                    <label for="district" class="form-label fw-bold text-secondary">請選擇要查詢的行政區：</label>
                    <select class="form-select form-select-lg" id="district" name="district">
                        <option value="中正區">中正區</option>
                        <option value="萬華區">萬華區</option>
                        <option value="大安區">大安區</option>
                        <option value="信義區">信義區</option>
                        <option value="中山區">中山區</option>
                        <option value="士林區">士林區</option>
                        <option value="內湖區">內湖區</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">查詢最新氣象</button>
            </form>
        </div>
    </div>
    
    <!-- 氣象結果面板 -->
    <div class="col-md-8">
        <div class="card shadow-sm border-0 bg-white">
            <div class="card-header bg-success text-white fw-bold py-3 fs-5">
                📍 當前觀測地點：台北市 {{ weather.district }}
            </div>
            <div class="card-body p-4">
                <div class="row align-items-center">
                    <div class="col-sm-6 text-center border-end">
                        <div class="display-1 fw-bold text-dark">{{ weather.temp }}°C</div>
                    </div>
                    <div class="col-sm-6 ps-4 mt-3 mt-sm-0">
                        <h3 class="fw-bold text-success mb-3">{{ weather.status }}</h3>
                        <p class="text-secondary mb-2 fs-5">💧 相對濕度：<strong>{{ weather.humidity }}%</strong></p>
                    </div>
                </div>
                <hr class="my-4">
                <div class="bg-light p-3 rounded border-start border-success border-4">
                    <h5 class="fw-bold text-dark mb-2">💡 專家生活建議</h5>
                    <p class="mb-0 text-muted fs-6">{{ weather.suggestion }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
