<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票即時查詢</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">期末報告網站</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">首頁(天氣/交通)</a>
                <a class="nav-link active" href="/stock">股票查詢</a>
                <a class="nav-link" href="/food">台北美食</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="mb-4">📈 金融市場即時查詢</h2>

        <!-- 查詢表單 -->
        <div class="card p-4 mb-4 shadow-sm">
            <form method="POST" class="row g-3 align-items-center">
                <div class="col-md-8">
                    <label for="ticker_input" class="form-label">輸入股票代號（台股請加 .TW，美股直接輸入代號）</label>
                    <input type="text" class="form-control" id="ticker_input" name="ticker_input" placeholder="例如: 2330.TW 或 AAPL">
                </div>
                <div class="col-md-4 align-self-end">
                    <button type="submit" class="btn btn-primary w-100">搜尋股票資料</button>
                </div>
            </form>
        </div>

        <!-- 錯誤訊息提示 -->
        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <!-- 股票結果顯示 -->
        {% if stock %}
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-primary">{{ stock.name }} ({{ stock.symbol }})</h3>
                <h2 class="card-subtitle my-3 text-dark">
                    現在價格：<span class="text-danger">{{ stock.price }}</span> {{ stock.currency }}
                </h2>
                <hr>
                <h5>公司簡介：</h5>
                <p class="text-muted" style="text-align: justify; line-height: 1.6;">{{ stock.summary }}</p>
            </div>
        </div>
        {% endif %}
    </div>

</body>
</html>
