<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末綜合綜合服務網</title>
    <!-- 使用 Bootstrap 讓網頁變美觀，不用自己寫太多 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- 導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">期末報告網站</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/">首頁(天氣/交通)</a>
                <a class="nav-link" href="/stock">股票查詢</a>
                <a class="nav-link" href="/food">台北美食</a>
            </div>
        </div>
    </nav>

    <!-- 主要內容 -->
    <div class="container my-5">
        <div class="p-5 mb-4 bg-white rounded-3 shadow-sm">
            <h1 class="display-5 fw-bold text-primary">歡迎來到台北生活綜合指南</h1>
            <p class="col-md-8 fs-4">本網站整合了即時天氣、交通建議、股票市場查詢以及台北在地美食推薦。</p>
        </div>

        <div class="row g-4">
            <!-- 天氣區塊 -->
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-primary text-white">🌤️ 今日台北天氣預報</div>
                    <div class="card-body">
                        <h3 class="card-title text-secondary">{{ weather.city }}</h3>
                        <p class="card-text fs-2 fw-bold text-dark">{{ weather.temp }}</p>
                        <p class="card-text"><strong>天氣狀況：</strong> {{ weather.condition }}</p>
                        <p class="card-text"><strong>環境濕度：</strong> {{ weather.humidity }}</p>
                    </div>
                </div>
            </div>

            <!-- 交通區塊 -->
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-success text-white">🚇 台北通勤與交通推薦</div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            {% for tip in tips %}
                            <li class="list-group-item">{{ tip }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted bg-white border-top mt-5">
        Python 期末報告專案 © 2026
    </footer>

</body>
</html>
